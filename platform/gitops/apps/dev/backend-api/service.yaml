apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: apps
  labels:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: terra
    terra/environment: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/component: api
  ports:
    - name: http  
      port: 80
      targetPort: http